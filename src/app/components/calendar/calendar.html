<main class="bg-background-dark min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-black tracking-tight text-slate-100 mb-2">Calendar</h1>
    <p class="text-slate-500 text-sm mb-8">Plan your gigs, rehearsals and sessions.</p>
  </div>

  <div class="max-w-7xl mx-auto px-6 pb-12">
    <div class="glass-card rounded-3xl shadow-xl p-6">
      <full-calendar #calendar [options]="calendarOptions"></full-calendar>
    </div>

    <!-- Add Event Modal -->
    @if (calendarModalActive()) {
      <div
        class="fixed inset-0 z-50 flex items-center justify-center p-4"
        style="background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px)"
        role="dialog"
        aria-modal="true"
      >
        <div class="w-full max-w-sm glass-card rounded-2xl shadow-2xl overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-white/5">
            <h2 class="font-bold text-slate-100">Add Event</h2>
            <button
              type="button"
              (click)="calendarModalActive.set(false)"
              class="text-slate-500 hover:text-slate-200 transition-colors"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="flex flex-col gap-4 p-5">
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Event name</label
              >
              <input
                type="text"
                placeholder="Balm show @ Palau St. Jordi"
                (input)="onTitleInput($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 text-slate-200 placeholder:text-slate-600 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Event color</label
              >
              <select
                (change)="onColorChange($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary text-slate-200 transition-all"
              >
                <option value="">-- Choose color --</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="yellow">Yellow</option>
                <option value="cyan">Cyan</option>
                <option value="pink">Pink</option>
                <option value="purple">Purple</option>
              </select>
            </div>
            <div class="flex justify-end gap-2 pt-2">
              <button
                type="button"
                (click)="calendarModalActive.set(false)"
                class="px-4 py-2 text-sm rounded-xl border border-white/10 text-slate-400 hover:bg-white/5 transition-all"
              >
                Cancel
              </button>
              <button
                type="button"
                (click)="saveEvent()"
                class="px-6 py-2 text-sm rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all"
              >
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    }

    <!-- Edit Event Modal -->
    @if (editCalendarModalActive()) {
      <div
        class="fixed inset-0 z-50 flex items-center justify-center p-4"
        style="background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px)"
        role="dialog"
        aria-modal="true"
      >
        <div class="w-full max-w-sm glass-card rounded-2xl shadow-2xl overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-white/5">
            <h2 class="font-bold text-slate-100">Edit Event</h2>
            <button
              type="button"
              (click)="editCalendarModalActive.set(false)"
              class="text-slate-500 hover:text-slate-200 transition-colors"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="flex flex-col gap-4 p-5">
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Event name</label
              >
              <input
                type="text"
                placeholder="Your mom's birthday"
                [value]="eventTitle()"
                (input)="onTitleInput($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 text-slate-200 placeholder:text-slate-600 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Event color</label
              >
              <select
                [value]="eventColor()"
                (change)="onColorChange($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary text-slate-200 transition-all"
              >
                <option value="">-- Choose color --</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="yellow">Yellow</option>
                <option value="cyan">Cyan</option>
                <option value="pink">Pink</option>
                <option value="purple">Purple</option>
              </select>
            </div>
            <div class="flex justify-end gap-2 pt-2">
              <button
                type="button"
                (click)="editCalendarModalActive.set(false)"
                class="px-4 py-2 text-sm rounded-xl border border-white/10 text-slate-400 hover:bg-white/5 transition-all"
              >
                Cancel
              </button>
              <button
                type="button"
                (click)="deleteEvent()"
                class="px-4 py-2 text-sm rounded-xl border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-all"
              >
                Delete
              </button>
              <button
                type="button"
                (click)="editEvent()"
                class="px-6 py-2 text-sm rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all"
              >
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    }
  </div>
</main>
