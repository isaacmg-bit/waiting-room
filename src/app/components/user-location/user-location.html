<div class="relative w-full">
  <input
    type="text"
    [formControl]="control"
    (input)="onInput($event)"
    (blur)="filteredCities.set([])"
    placeholder="City name"
    class="w-full bg-background-dark border border-border-dark rounded-lg text-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
  />

  @if (filteredCities().length) {
    <ul
      class="absolute w-full bg-surface-dark border border-border-dark rounded-lg shadow-lg z-9999 max-h-60 overflow-auto mt-1"
    >
      @for (city of filteredCities(); track city.city) {
        <li
          class="px-3 py-2 text-slate-200 hover:bg-background-dark cursor-pointer transition-colors"
          (mousedown)="selectCity(city)"
        >
          {{ city.city }} ({{ city.province }})
        </li>
      }
    </ul>
  }
</div>
