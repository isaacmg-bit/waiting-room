<main class="bg-background-dark min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-black tracking-tight text-slate-100 mb-2">Charts</h1>
    <p class="text-slate-500 text-sm mb-8">Visual overview of your musical activity.</p>
  </div>

  <div class="max-w-7xl mx-auto px-6 pb-12">
    <div class="grid gap-6 md:grid-cols-2">
      <div class="glass-card rounded-3xl overflow-hidden shadow-xl">
        <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center">
          <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Bar Chart</h2>
          <span class="text-xs text-slate-600">Overview</span>
        </div>
        <div class="p-6">
          <canvas
            #barChart
            role="img"
            aria-labelledby="bar-chart-title"
            class="w-full h-100"
          ></canvas>
        </div>
      </div>

      <div class="glass-card rounded-3xl overflow-hidden shadow-xl">
        <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center">
          <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Line Chart</h2>
          <span class="text-xs text-slate-600">Trends</span>
        </div>
        <div class="p-6">
          <canvas
            #lineChart
            role="img"
            aria-labelledby="line-chart-title"
            class="w-full h-100"
          ></canvas>
        </div>
      </div>
    </div>
  </div>
</main>
