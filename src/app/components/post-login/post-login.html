<main class="min-h-screen flex mt-10 justify-center bg-slate-950">
  <div class="w-full max-w-md">
    <div class="bg-slate-900 border border-slate-800 rounded-xl shadow-xl overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-800">
        <h1 class="text-xl font-semibold text-slate-200">Create Profile</h1>
        <p class="text-sm text-slate-500"></p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6 flex flex-col gap-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Full name</label>
          <input
            type="text"
            placeholder="Enter your first and last name"
            formControlName="name"
            class="w-full px-4 py-2 rounded-md bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600"
          />
        </div>

        <div>
          <label class="block text-xs text-slate-400 mb-1">Location</label>
          <input
            type="Location"
            placeholder="Your current hometown"
            formControlName="location"
            class="w-full px-4 py-2 rounded-md bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="mt-2 w-full py-2 rounded-md bg-emerald-600 hover:bg-emerald-500 transition font-medium text-sm disabled:opacity-50"
        >
          {{ loading ? 'Creating profile...' : 'Create profile' }}
        </button>
      </form>
    </div>
  </div>
</main>
