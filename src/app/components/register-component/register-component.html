<main class="min-h-screen flex items-center justify-center p-4 bg-background-dark">
  <div class="relative w-full max-w-md z-10">

    <div class="absolute -top-20 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-purple-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">

      <div class="h-1 w-full bg-white/5">
        <div class="h-full bg-linear-to-r from-primary to-purple-400 w-full"></div>
      </div>

      <div class="p-8 text-center">
        <div class="inline-flex items-center justify-center size-14 rounded-2xl bg-primary/10 text-primary mb-6">
          <span class="material-symbols-outlined text-3xl">person_add</span>
        </div>
        <h1 class="text-2xl font-black tracking-tight bg-linear-to-r from-primary via-purple-400 to-cyan-400 bg-clip-text text-transparent">
          Create Account
        </h1>
        <p class="text-slate-500 text-sm mt-1">Register to continue</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="px-8 pb-8 space-y-5">

        <div class="space-y-2">
          <label class="text-xs font-semibold uppercase tracking-widest text-slate-500">Email</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
              email
            </span>
            <input
              type="email"
              placeholder="Enter your email"
              formControlName="email"
              class="w-full pl-12 pr-4 py-3 bg-black/30 border border-white/10 rounded-xl focus:ring-1 focus:ring-primary focus:border-primary/50 outline-none transition-all placeholder:text-slate-600 text-slate-200"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-semibold uppercase tracking-widest text-slate-500">Password</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
              lock
            </span>
            <input
              type="password"
              placeholder="Create password"
              formControlName="password"
              class="w-full pl-12 pr-4 py-3 bg-black/30 border border-white/10 rounded-xl focus:ring-1 focus:ring-primary focus:border-primary/50 outline-none transition-all placeholder:text-slate-600 text-slate-200"
            />
          </div>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="loading"
            class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-black rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-50"
          >
            {{ loading ? 'Creating account...' : 'Register' }}
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>

        <p class="text-center text-sm text-slate-500 pt-1">
          Already have an account?
          <a routerLink="/login" class="text-primary hover:opacity-80 transition font-medium">Login</a>
        </p>

      </form>
    </div>
  </div>
</main>
