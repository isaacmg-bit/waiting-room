<main
  class="min-h-screen flex items-center justify-center p-4 bg-background-light dark:bg-background-dark transition-colors duration-300"
>
  <div class="relative w-full max-w-md z-10">
    <!-- Glow background -->
    <div
      class="absolute -top-20 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[120px]"
    ></div>

    <div
      class="bg-white/80 dark:bg-slate-900/50 backdrop-blur-xl border border-primary/10 dark:border-primary/20 rounded-xl shadow-2xl overflow-hidden"
    >
      <!-- Header -->
      <div class="p-8 text-center border-b border-slate-200 dark:border-slate-800">
        <div
          class="inline-flex items-center justify-center size-14 rounded-full bg-primary/10 text-primary mb-6"
        >
          <span class="material-symbols-outlined text-3xl">login</span>
        </div>

        <h1 class="text-2xl font-bold tracking-tight">Login</h1>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

        <!-- Email -->
        <div class="space-y-2">
          <label
            class="text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >
            Email
          </label>

          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"
            >
              email
            </span>

            <input
              type="email"
              placeholder="Enter your email"
              formControlName="email"
              class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label
            class="text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >
            Password
          </label>

          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"
            >
              lock
            </span>

            <input
              type="password"
              placeholder="Enter password"
              formControlName="password"
              class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
            />
          </div>
        </div>

        <!-- Actions -->
        <div class="space-y-3 pt-2">
          <button
            type="submit"
            [disabled]="loading"
            class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2"
          >
            {{ loading ? 'Logging in...' : 'Login' }}
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>

          <div class="flex flex-col gap-2 text-center text-sm">
            <button
              type="button"
              class="text-primary hover:underline transition"
              (click)="resetPassword()"
            >
              Reset password
            </button>

            <button
              type="button"
              routerLink="/register"
              class="text-slate-500 dark:text-slate-400 hover:text-primary transition"
            >
              Not a user? Click here to register
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</main>
