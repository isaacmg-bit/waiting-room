<main class="bg-background-dark min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-black tracking-tight text-slate-100 mb-2">Map</h1>
    <p class="text-slate-500 text-sm mb-8">Discover shows and rehearsal spaces near you.</p>
  </div>

  <div class="max-w-7xl mx-auto px-6 pb-12">
    <div class="glass-card rounded-3xl shadow-xl p-6">
      <fieldset class="mb-4">
        <legend class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-3">
          Filter by category
        </legend>
        <div class="flex gap-4">
          <label
            class="flex items-center gap-2 cursor-pointer text-sm text-slate-400 hover:text-slate-200 transition"
          >
            <input
              type="checkbox"
              [checked]="locationService.activeFilters().includes('show')"
              (change)="toggleFilter('show')"
              class="rounded border-white/10 bg-black/30 text-primary focus:ring-primary"
            />
            Shows
          </label>
          <label
            class="flex items-center gap-2 cursor-pointer text-sm text-slate-400 hover:text-slate-200 transition"
          >
            <input
              type="checkbox"
              [checked]="locationService.activeFilters().includes('rehearsalspace')"
              (change)="toggleFilter('rehearsalspace')"
              class="rounded border-white/10 bg-black/30 text-primary focus:ring-primary"
            />
            Rehearsal Space
          </label>
        </div>
      </fieldset>
      <div
        id="map"
        class="w-full h-125 rounded-2xl border border-white/5"
        role="application"
        aria-label="Interactive map"
      ></div>
    </div>

    <!-- Add Location Modal -->
    @if (locationService.locationModalActive()) {
      <div
        class="fixed inset-0 z-1000 flex items-center justify-center p-4"
        style="background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px)"
        role="dialog"
        aria-modal="true"
      >
        <div class="w-full max-w-sm glass-card rounded-2xl shadow-2xl overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-white/5">
            <h2 class="font-bold text-slate-100">Add Location</h2>
            <button
              type="button"
              (click)="closeModals()"
              class="text-slate-500 hover:text-slate-200 transition-colors"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="flex flex-col gap-4 p-5">
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Name</label
              >
              <input
                type="text"
                placeholder="Enter name"
                [value]="locationService.nameInput()"
                (input)="onNameInput($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 text-slate-200 placeholder:text-slate-600 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Description</label
              >
              <input
                type="text"
                placeholder="Max Donal..."
                [value]="locationService.descriptionInput()"
                (input)="onDescriptionInput($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 text-slate-200 placeholder:text-slate-600 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Category</label
              >
              <select
                [value]="locationService.categoryInput()"
                (change)="onCategoryChange($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary text-slate-200 transition-all"
              >
                <option value="">-- Choose category --</option>
                <option value="show">Shows</option>
                <option value="rehearsalspace">Rehearsal Space</option>
              </select>
            </div>
            <div class="flex justify-end gap-2 pt-2">
              <button
                type="button"
                (click)="closeModals()"
                class="px-4 py-2 text-sm rounded-xl border border-white/10 text-slate-400 hover:bg-white/5 transition-all"
              >
                Cancel
              </button>
              <button
                type="button"
                (click)="saveLocation()"
                class="px-6 py-2 text-sm rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all"
              >
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    }

    <!-- Edit Location Modal -->
    @if (locationService.editLocationModalActive()) {
      <div
        class="fixed inset-0 z-1000 flex items-center justify-center p-4"
        style="background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px)"
        role="dialog"
        aria-modal="true"
      >
        <div class="w-full max-w-sm glass-card rounded-2xl shadow-2xl overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-white/5">
            <h2 class="font-bold text-slate-100">Edit Location</h2>
            <button
              type="button"
              (click)="closeModals()"
              class="text-slate-500 hover:text-slate-200 transition-colors"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="flex flex-col gap-4 p-5">
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Name</label
              >
              <input
                type="text"
                placeholder="Enter name"
                [value]="locationService.nameInput()"
                (input)="onNameInput($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 text-slate-200 placeholder:text-slate-600 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Description</label
              >
              <input
                type="text"
                placeholder="Max Donal..."
                [value]="locationService.descriptionInput()"
                (input)="onDescriptionInput($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 text-slate-200 placeholder:text-slate-600 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-slate-500"
                >Category</label
              >
              <select
                [value]="locationService.categoryInput()"
                (change)="onCategoryChange($event)"
                class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary text-slate-200 transition-all"
              >
                <option value="">-- Choose category --</option>
                <option value="show">Shows</option>
                <option value="rehearsalspace">Rehearsal Space</option>
              </select>
            </div>
            <div class="flex justify-end gap-2 pt-2">
              <button
                type="button"
                (click)="closeModals()"
                class="px-4 py-2 text-sm rounded-xl border border-white/10 text-slate-400 hover:bg-white/5 transition-all"
              >
                Cancel
              </button>
              <button
                type="button"
                (click)="deleteLocation()"
                class="px-4 py-2 text-sm rounded-xl border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-all"
              >
                Delete
              </button>
              <button
                type="button"
                (click)="editLocation()"
                class="px-6 py-2 text-sm rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all"
              >
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    }
  </div>
</main>
