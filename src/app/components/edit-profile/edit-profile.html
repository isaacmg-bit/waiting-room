<body class="bg-background-dark font-display text-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8 md:px-8">


    <form [formGroup]="form" class="space-y-6">
      <!-- 1. Profile Media -->
      <section class="glass-card rounded-3xl p-6 md:p-8">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-primary">photo_camera</span>
          <h2 class="text-xl font-bold">Profile Media</h2>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="flex flex-col items-center gap-4">
            <div class="relative group">
              <div
                class="size-48 rounded-full overflow-hidden border-4 border-primary/20 p-1 cursor-pointer"
                (click)="profileFileInput.click()"
              >
                <img
                  #img
                  class="w-full h-full object-cover rounded-full opacity-80 group-hover:opacity-100 transition-opacity"
                  [src]="profilePhotoUrl() || 'assets/img/Portrait_Placeholder.png'"
                  (error)="img.src = 'assets/img/Portrait_Placeholder.png'"
                  alt="Profile photo"
                />
              </div>
              @if (profilePhotoUrl()) {
                <button
                  (click)="removeProfilePhoto()"
                  type="button"
                  class="absolute bottom-2 right-2 size-10 bg-red-600 text-white rounded-full flex items-center justify-center shadow-xl hover:bg-red-500 transition-colors z-10"
                >
                  <ng-icon name="heroTrash" size="16" />
                </button>
              } @else {
                <button
                  (click)="profileFileInput.click()"
                  type="button"
                  class="absolute bottom-2 right-2 size-10 bg-primary text-white rounded-full flex items-center justify-center shadow-xl hover:bg-primary/90 transition-colors"
                >
                </button>
              }
              <input
                type="file"
                #profileFileInput
                hidden
                accept="image/*"
                (change)="onProfileSelected($event)"
              />
            </div>
          </div>
          <div class="lg:col-span-2">
            <label class="block text-xs font-semibold mb-3 text-slate-400 uppercase tracking-widest"
              >Showcase Gallery</label
            >
            <app-user-gallery></app-user-gallery>
          </div>
        </div>
      </section>

      <!-- 2. Identity -->
      <section class="glass-card rounded-3xl p-6 md:p-8">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-cyan-400">badge</span>
          <h2 class="text-xl font-bold">Identity</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest"
              >Full Name</label
            >
            <input
              formControlName="name"
              class="w-full bg-black/30 border border-border-dark rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-slate-200"
              type="text"
              placeholder="Stage or real name"
            />
          </div>
          <div class="space-y-2">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest"
              >Email Address</label
            >
            <input
              formControlName="email"
              class="w-full bg-black/30 border border-border-dark rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-slate-200"
              type="email"
              placeholder="hello@musician.com"
            />
          </div>
          <div class="md:col-span-2">
            <app-user-location
              [control]="form.controls.location"
              (citySelected)="selectedCity = $event"
            ></app-user-location>
          </div>
        </div>
      </section>

      <!-- 3. Musical DNA -->
      <section class="glass-card rounded-3xl p-6 md:p-8">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-purple-400">music_note</span>
          <h2 class="text-xl font-bold">Musical DNA</h2>
        </div>
        <div class="space-y-6">
          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest block mb-3"
              >Instruments</label
            >
            <app-user-instruments></app-user-instruments>
          </div>
<div class="mt-6 pt-6 relative">
  <div class="absolute top-0 left-0 right-0 h-px bg-linear-to-r from-transparent via-white/10 to-transparent"></div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest block mb-3"
              >Genres</label
            >
            <app-user-genres></app-user-genres>
          </div>
         <div class="mt-6 pt-6 relative">
  <div class="absolute top-0 left-0 right-0 h-px bg-linear-to-r from-transparent via-white/10 to-transparent"></div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-widest block mb-3"
              >Influence Bands</label
            >
          </div>
        </div>
      </section>

      <!-- 4. Gear & Space -->
      <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass-card rounded-3xl p-6 md:p-8">
          <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-primary">speaker</span>
            <h2 class="text-xl font-bold">Gear &amp; Equipment</h2>
          </div>
          <textarea
            class="w-full bg-black/30 border border-border-dark rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none text-slate-200"
            placeholder="Describe your instruments, amps, pedals..."
            rows="4"
          ></textarea>
        </div>
        <div class="glass-card rounded-3xl p-6 md:p-8">
          <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-cyan-400">room_preferences</span>
            <h2 class="text-xl font-bold">Rehearsal Space</h2>
          </div>
          <textarea
            class="w-full bg-black/30 border border-border-dark rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none text-slate-200"
            placeholder="Details about your studio or practice room..."
            rows="4"
          ></textarea>
        </div>
      </section>

      <!-- 5. Presence -->
      <section class="glass-card rounded-3xl p-6 md:p-8">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-purple-400">language</span>
          <h2 class="text-xl font-bold">Presence</h2>
        </div>
        <div class="space-y-4">
          <div class="flex flex-col md:flex-row gap-4 items-end md:items-center">
            <div class="w-full md:w-1/4">
              <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block"
                >Platform</label
              >
              <select
                class="w-full bg-black/30 border border-border-dark rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none appearance-none text-slate-200"
              >
                <option>Instagram</option>
                <option>SoundCloud</option>
                <option>Spotify</option>
                <option>YouTube</option>
              </select>
            </div>
            <div class="flex-1 w-full">
              <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block"
                >URL / Handle</label
              >
              <input
                class="w-full bg-black/30 border border-border-dark rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition-all text-slate-200"
                placeholder="https://..."
                type="text"
              />
            </div>
            <button
              class="p-3 text-red-500 hover:bg-red-500/10 rounded-xl transition-colors"
              type="button"
            >
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
          <button
            class="flex items-center gap-2 text-primary font-bold mt-2 hover:opacity-80 transition-opacity"
            type="button"
          >
            <span class="material-symbols-outlined">add_circle</span> Add Social Link
          </button>
        </div>
      </section>

      <!-- Sticky bottom bar -->
      <div class="sticky bottom-6 z-20 flex justify-center pb-8">
        <div
          class="bg-black/50 backdrop-blur-2xl border border-white/10 p-2 rounded-2xl shadow-2xl flex items-center gap-4"
        >
          <button
            class="px-6 py-3 rounded-xl font-medium hover:bg-white/5 transition-colors text-slate-300"
            type="button"
          >
            Discard
          </button>
          <button
            type="button"
            (click)="saveProfile()"
            class="px-10 py-3 bg-primary text-white font-black rounded-xl shadow-lg shadow-primary/30 hover:scale-[1.05] transition-transform"
          >
            Save Profile Changes
          </button>
        </div>
      </div>
    </form>
  </div>
</body>
